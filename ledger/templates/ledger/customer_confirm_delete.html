{% extends 'ledger/base.html' %}
{% block title %}Delete Customer{% endblock %}
{% block content %}
<h1>Delete Customer</h1>
<p>Are you sure you want to delete <strong>{{ customer.full_name }}</strong>? This cannot be undone.</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, Delete</button>
    <a class="btn" href="{% url 'customer_list' %}">Cancel</a>
</form>
{% endblock %}
